<svg xmlns="http://www.w3.org/2000/svg" width="300" height="155" viewBox="0 0 300 155">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050512;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#08081a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#050512;stop-opacity:1" />
      <stop offset="30%"  style="stop-color:#88102a;stop-opacity:1" />
      <stop offset="50%"  style="stop-color:#00eeff;stop-opacity:1" />
      <stop offset="70%"  style="stop-color:#88102a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050512;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="155" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="20"  x2="300" y2="20"  stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="40"  x2="300" y2="40"  stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="60"  x2="300" y2="60"  stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="80"  x2="300" y2="80"  stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="100" x2="300" y2="100" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="120" x2="300" y2="120" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="140" x2="300" y2="140" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="30"  y1="0" x2="30"  y2="155" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="60"  y1="0" x2="60"  y2="155" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="90"  y1="0" x2="90"  y2="155" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="155" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="155" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="180" y1="0" x2="180" y2="155" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="210" y1="0" x2="210" y2="155" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="155" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="270" y1="0" x2="270" y2="155" stroke="#00eeff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Top neon border -->
  <rect x="0" y="0" width="300" height="2" fill="url(#topLine)"/>

  <!-- Corner accents (top-left) -->
  <line x1="0"  y1="16" x2="16" y2="16" stroke="#006677" stroke-width="1.5"/>
  <line x1="16" y1="0"  x2="16" y2="16" stroke="#006677" stroke-width="1.5"/>

  <!-- Corner accents (top-right) -->
  <line x1="300" y1="16" x2="284" y2="16" stroke="#006677" stroke-width="1.5"/>
  <line x1="284" y1="0"  x2="284" y2="16" stroke="#006677" stroke-width="1.5"/>

  <!-- Corner accents (bottom-right) -->
  <line x1="300" y1="139" x2="284" y2="139" stroke="#88102a" stroke-width="1.5"/>
  <line x1="284" y1="155" x2="284" y2="139" stroke="#88102a" stroke-width="1.5"/>

  <!-- Film strip body -->
  <rect x="108" y="32" width="84" height="66" rx="3" ry="3"
        fill="none" stroke="#00eeff" stroke-width="1.5" filter="url(#glow)" stroke-opacity="0.8"/>
  <rect x="109" y="33" width="82" height="64" rx="2" ry="2"
        fill="#050518"/>

  <!-- Film strip holes left -->
  <rect x="100" y="36" width="10" height="8" rx="1.5" fill="#006677" opacity="0.7"/>
  <rect x="100" y="50" width="10" height="8" rx="1.5" fill="#006677" opacity="0.7"/>
  <rect x="100" y="64" width="10" height="8" rx="1.5" fill="#006677" opacity="0.7"/>
  <rect x="100" y="78" width="10" height="8" rx="1.5" fill="#006677" opacity="0.7"/>
  <rect x="100" y="86" width="10" height="8" rx="1.5" fill="#006677" opacity="0.4"/>

  <!-- Film strip holes right -->
  <rect x="190" y="36" width="10" height="8" rx="1.5" fill="#006677" opacity="0.7"/>
  <rect x="190" y="50" width="10" height="8" rx="1.5" fill="#006677" opacity="0.7"/>
  <rect x="190" y="64" width="10" height="8" rx="1.5" fill="#006677" opacity="0.7"/>
  <rect x="190" y="78" width="10" height="8" rx="1.5" fill="#006677" opacity="0.7"/>
  <rect x="190" y="86" width="10" height="8" rx="1.5" fill="#006677" opacity="0.4"/>

  <!-- Camera lens circle -->
  <circle cx="150" cy="64" r="22" fill="none" stroke="#00eeff" stroke-width="1.5"
          filter="url(#glow)" stroke-opacity="0.9"/>
  <circle cx="150" cy="64" r="16" fill="none" stroke="#00eeff" stroke-width="1"
          stroke-opacity="0.5"/>
  <circle cx="150" cy="64" r="9"  fill="none" stroke="#00eeff" stroke-width="1.5"
          filter="url(#glow)" stroke-opacity="0.8"/>
  <circle cx="150" cy="64" r="4"  fill="#00eeff" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Lens reflection dot -->
  <circle cx="142" cy="56" r="2.5" fill="#00eeff" opacity="0.6" filter="url(#glow)"/>

  <!-- NO IMAGE text -->
  <text x="150" y="117"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="10"
        fill="#00eeff"
        text-anchor="middle"
        letter-spacing="4"
        filter="url(#glow)"
        opacity="0.8">NO IMAGE</text>

  <!-- Scan line decoration -->
  <line x1="60" y1="117" x2="108" y2="117" stroke="#006677" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="192" y1="117" x2="240" y2="117" stroke="#006677" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- Bottom subtle text -->
  <text x="150" y="140"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="7"
        fill="#2a5060"
        text-anchor="middle"
        letter-spacing="3">// AWAITING DATA //</text>
</svg>
